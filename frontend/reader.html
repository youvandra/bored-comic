<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>%%TITLE%% — BoredComic</title>
  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="BoredComic" />
  <meta property="og:title" content="%%TITLE%%" />
  <meta property="og:description" content="%%SUMMARY%%" />
  <meta property="og:image" content="%%COVER_URL%%" />
  <meta property="og:url" content="%%READER_URL%%" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="%%TITLE%%" />
  <meta name="twitter:description" content="%%SUMMARY%%" />
  <meta name="twitter:image" content="%%COVER_URL%%" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root { --ink:#111111; --paper:#fdf6e3; --yellow:#ffd23f; --red:#e63946; --cream:#f5e9c8; }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Comic Neue', ui-sans-serif, system-ui, sans-serif;
      color: var(--ink);
      background-color: var(--yellow);
      background-image: radial-gradient(rgba(0,0,0,0.14) 1.4px, transparent 1.5px);
      background-size: 14px 14px;
      min-height: 100vh;
    }
    .display { font-family: 'Bangers', cursive; letter-spacing: 1px; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 28px 14px 60px; }
    header { text-align: center; margin-bottom: 20px; }
    .brand { font-size: 1.4rem; text-decoration: none; color: var(--ink); }
    .brand span { color: var(--red); }
    h1 {
      font-family: 'Bangers', cursive; letter-spacing: 1px;
      font-size: clamp(2.2rem, 7vw, 4rem); line-height: 1;
      color: var(--yellow); -webkit-text-stroke: 2px var(--ink);
      text-shadow: 4px 4px 0 var(--ink); margin: 10px 0 6px;
    }
    .meta { font-weight: 700; }
    .badge {
      display: inline-block; background: var(--red); color: #fff;
      font-family: 'Bangers', cursive; letter-spacing: 1px;
      border: 3px solid var(--ink); box-shadow: 3px 3px 0 var(--ink);
      padding: 3px 12px; margin: 4px 3px; transform: rotate(-2deg);
    }
    .badge.alt { background: #fff; color: var(--ink); transform: rotate(1.5deg); }
    .synopsis {
      background: var(--cream); border: 3px solid var(--ink);
      padding: 12px 16px; font-style: italic; font-weight: 700;
      max-width: 640px; margin: 14px auto 0;
    }
    .pages { display: flex; flex-direction: column; gap: 26px; margin-top: 26px; }
    .page-frame { border: 4px solid var(--ink); box-shadow: 8px 8px 0 var(--ink); background: #fff; }
    .page-frame img { display: block; width: 100%; height: auto; }
    .expired {
      background: #fff; border: 4px solid var(--ink); box-shadow: 8px 8px 0 var(--ink);
      padding: 28px; text-align: center; font-weight: 700; margin-top: 26px;
    }
    footer { text-align: center; margin-top: 40px; font-weight: 700; }
    footer .cta {
      display: inline-block; background: var(--ink); color: var(--yellow);
      font-family: 'Bangers', cursive; letter-spacing: 1px; font-size: 1.3rem;
      text-decoration: none; border: 3px solid var(--ink);
      box-shadow: 4px 4px 0 rgba(0,0,0,0.35); padding: 10px 22px;
    }
    footer p { margin-top: 12px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="brand display" href="/">BORED<span>COMIC</span></a>
      <h1>%%TITLE%%</h1>
      <div class="meta">
        <span class="badge">%%GENRE%%</span>
        <span class="badge alt">%%STYLE%%</span>
        <span class="badge alt">%%VIEWS%% READS</span>
      </div>
      <div class="synopsis">%%SUMMARY%%</div>
    </header>

    <div id="content"></div>

    <footer>
      <a class="cta" href="/">MAKE YOUR OWN COMIC →</a>
      <p>Made with BoredComic — an A2MCP Agent Service Provider · Built for OKX.AI · AI-generated content</p>
    </footer>
  </div>

  <script id="comic-data" type="application/json">%%PAYLOAD%%</script>
  <script>
    const data = JSON.parse(document.getElementById("comic-data").textContent);
    const content = document.getElementById("content");

    if (!data.filesAvailable) {
      const box = document.createElement("div");
      box.className = "expired";
      box.textContent = "This comic's image files have expired (24h storage). The metadata lives on — ask the agent that made it to regenerate!";
      content.appendChild(box);
    } else {
      const pages = document.createElement("div");
      pages.className = "pages";
      // Webtoon strips read best as the single tall image; otherwise cover + pages.
      const urls = data.stripUrl ? [data.coverUrl, data.stripUrl] : data.pageUrls;
      for (const url of urls) {
        const frame = document.createElement("div");
        frame.className = "page-frame";
        const img = document.createElement("img");
        img.src = url;
        img.loading = "lazy";
        img.alt = data.title + " — comic page";
        frame.appendChild(img);
        pages.appendChild(frame);
      }
      content.appendChild(pages);
    }
  </script>
</body>
</html>
